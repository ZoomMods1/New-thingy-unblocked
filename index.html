<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial | Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h1>space.</h1>
            <input type="password" id="password-input" placeholder="Enter Password">
            <button onclick="checkPassword()">Enter</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <nav class="navbar">
            <div class="nav-left"><span class="logo">SPACE</span></div>
            <div class="nav-links">
                <a href="#" onclick="openTab('home')">Home</a>
                <a href="#" onclick="openTab('games')">Games</a>
                <a href="#" onclick="openTab('settings')">Settings</a>
            </div>
        </nav>

        <div class="hero">
            <h1 class="glitch-text">Space</h1>
            <div class="search-container">
                <input type="text" id="url-input" placeholder="Explore the cosmos...">
                <button onclick="launchProxy()">Launch</button>
            </div>
        </div>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script src="script.js"></script>
</body>
</html>
