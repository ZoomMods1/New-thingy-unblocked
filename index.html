<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space | Celestial</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>space.</h1>
            <input type="password" id="password-input" placeholder="Enter Password">
            <button id="login-btn">Enter</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <nav class="navbar">
            <span class="logo">SPACE</span>
            <div class="nav-links">
                <a href="#">Games</a>
                <a href="#">Settings</a>
            </div>
        </nav>
        <div class="hero">
            <h1>Celestial</h1>
            <div class="search-container">
                <input type="text" id="url-input" placeholder="Explore the cosmos...">
                <button onclick="launchProxy()">Launch</button>
            </div>
        </div>
    </div>

    <script>
        // THE PASSWORD CHECK
        const CORRECT_PASS = "Spaceistuff"; 

        document.getElementById('login-btn').addEventListener('click', function() {
            const input = document.getElementById('password-input').value;
            
            if (input === CORRECT_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.body.style.backgroundColor = "#0b0b0e"; // Forces dark mode
            } else {
                alert("Incorrect Password!");
            }
        });

        function launchProxy() {
            const val = document.getElementById('url-input').value;
            if (val) {
                window.location.href = "/service/" + btoa(val);
            }
        }
    </script>
</body>
</html>
