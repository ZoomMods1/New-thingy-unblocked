<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>space.</h1>
            <input type="password" id="password-input" placeholder="Enter Password">
            <button onclick="checkPassword()">Enter</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        
        <aside class="sidebar">
            <div class="side-icon active"><i class="fa-solid fa-house"></i></div>
            <div class="side-icon"><i class="fa-solid fa-gamepad"></i></div>
            <div class="side-icon"><i class="fa-solid fa-clapperboard"></i></div>
            <div class="side-icon"><i class="fa-solid fa-compass"></i></div>
            <div class="side-icon"><i class="fa-solid fa-gear"></i></div>
        </aside>

        <main class="content">
            <div class="hero">
                <h1 class="logo-text">space.</h1>
                <div class="search-bar-container">
                    <input type="text" id="url-input" placeholder="search with ease (internal)">
                </div>
                
                <div class="icon-grid">
                    <div class="grid-item">
                        <div class="circle-icon"><i class="fa-solid fa-gamepad"></i></div>
                        <span>games</span>
                    </div>
                    <div class="grid-item">
                        <div class="circle-icon"><i class="fa-solid fa- rocket"></i></div>
                        <span>quick apps</span>
                    </div>
                    <div class="grid-item">
                        <div class="circle-icon"><i class="fa-solid fa-video"></i></div>
                        <span>media</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        const PASS = "Spaceistuff";

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else {
                alert("Access Denied");
            }
        }
    </script>
</body>
</html>
