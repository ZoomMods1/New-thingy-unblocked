<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial | Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>space.</h1>
            <input type="password" id="password-input" placeholder="Enter Password">
            <button onclick="checkPassword()">Enter</button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <nav class="navbar">
            <div class="nav-left"><span class="logo">SPACE</span></div>
            <div class="nav-links">
                <a href="#" onclick="alert('Games coming soon!')">Games</a>
                <a href="#" onclick="alert('Settings coming soon!')">Settings</a>
            </div>
        </nav>

        <div class="hero">
            <h1 class="glitch-text">Celestial</h1>
            <div class="search-container">
                <input type="text" id="url-input" placeholder="Explore the cosmos...">
                <button onclick="launchProxy()">Launch</button>
            </div>
        </div>
    </div>

    <script>
        // Use the password you want here
        const PASS = "space"; 

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
            } else {
                alert("Wrong password!");
            }
        }

        function launchProxy() {
            const val = document.getElementById('url-input').value;
            if(val) {
                // This will redirect to your UV proxy path
                window.location.href = "/service/" + btoa(val);
            }
        }
    </script>
</body>
</html>
